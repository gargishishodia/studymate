<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StudyMate — add notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--ink:#11131f;--ink-soft:#2a2d3d;--paper:#f7f6f2;--line:#e2ddd0;--amber:#d9a441;--amber-deep:#a9742017;--muted:#6f6c63;--ok:#3f7d52;--err:#b4453b;--radius:14px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter",system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2{font-family:"Fraunces",Georgia,serif;font-weight:500;line-height:1.1;letter-spacing:-0.01em}
  .wrap{max-width:720px;margin:0 auto;padding:0 24px}
  /* nav */
  nav{border-bottom:1px solid var(--line);background:var(--paper)}
  .nav-in{max-width:720px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;gap:18px}
  .brand{font-family:"Fraunces",serif;font-weight:600;font-size:18px}
  .nav-links{display:flex;gap:6px;margin-left:8px}
  .nav-links a{font-size:14px;font-weight:600;color:var(--muted);text-decoration:none;padding:7px 14px;border-radius:8px}
  .nav-links a:hover{color:var(--ink)}
  .nav-links a.active{background:var(--ink);color:var(--paper)}
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .who{font-size:13px;color:var(--muted)}
  .signout{font-size:13px;font-weight:600;color:var(--err);background:none;border:none;cursor:pointer}
  /* content */
  main{padding:54px 0}
  .step-label{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:12px}
  h2{font-size:clamp(28px,5vw,38px);margin-bottom:10px}
  .lede{color:var(--muted);margin-bottom:26px;max-width:52ch}
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:26px}
  label.fld{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin:0 0 7px}
  textarea{width:100%;font-family:inherit;font-size:15px;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:12px 14px;resize:vertical;min-height:200px;line-height:1.6;transition:border-color .15s,box-shadow .15s}
  textarea:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-deep)}
  .actions{margin-top:18px;display:flex;gap:12px;flex-wrap:wrap}
  button.go{font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;border:none;border-radius:10px;padding:12px 22px;background:var(--ink);color:var(--paper);transition:transform .1s,background .15s}
  button.go:hover{background:var(--ink-soft)} button.go:active{transform:translateY(1px)}
  .note{font-size:13px;margin-top:14px;min-height:18px}
  .note.ok{color:var(--ok)} .note.err{color:var(--err)} .note.muted{color:var(--muted)}
</style>
</head>
<body>
  <nav>
    <div class="nav-in">
      <span class="brand">StudyMate</span>
      <div class="nav-links">
        <a href="notes.html" class="active">Notes</a>
        <a href="ask.html">Ask</a>
        <a href="quiz.html">Quiz</a>
      </div>
      <div class="nav-right">
        <span class="who" id="who"></span>
        <button class="signout" id="signout">Sign out</button>
      </div>
    </div>
  </nav>

  <main class="wrap">
    <div class="step-label">Your notes</div>
    <h2>Add your notes</h2>
    <p class="lede">Paste lecture notes, a chapter, or anything you want to study. StudyMate breaks it into pieces and remembers it. Add as much as you like.</p>
    <div class="card">
      <label class="fld" for="docText">Notes text</label>
      <textarea id="docText" placeholder="Paste your notes here…"></textarea>
      <div class="actions">
        <button class="go" id="uploadBtn">Save notes</button>
        <button class="go" id="toAsk" style="background:transparent;color:var(--ink);border:1px solid var(--line)">Go to Ask &rarr;</button>
      </div>
      <div class="note muted" id="note">Saved notes are private to your account.</div>
    </div>
  </main>

<script>
  const API = "http://127.0.0.1:8000";
  const $ = (id)=>document.getElementById(id);
  const token = localStorage.getItem("studymate_token");
  // gate: must be signed in
  if(!token){ window.location.href = "login.html"; }
  $("who").textContent = localStorage.getItem("studymate_email") || "";

  const setNote = (m,k)=>{ $("note").className="note "+(k||"muted"); $("note").textContent=m; };

  $("signout").onclick = ()=>{ localStorage.removeItem("studymate_token"); localStorage.removeItem("studymate_email"); window.location.href="login.html"; };
  $("toAsk").onclick = ()=>{ window.location.href="ask.html"; };

  $("uploadBtn").onclick = async () => {
    const text = $("docText").value.trim();
    if(!text){ setNote("Paste some notes to save.","err"); return; }
    setNote("Saving and processing your notes…","muted");
    try{
      const r = await fetch(`${API}/documents`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${token}`},body:JSON.stringify({text})});
      if(r.status===401){ window.location.href="login.html"; return; }
      const d = await r.json();
      if(r.ok){ setNote("Saved. Give it a few seconds to finish, then head to Ask.","ok"); $("docText").value=""; }
      else setNote(d.detail||"Could not save notes.","err");
    }catch(e){ setNote("Can't reach the server. Is it running?","err"); }
  };
</script>
</body>
</html>
